# ===============================
# Application Configuration
# ===============================
spring.application.name=CareerPilot_AI

# ===============================
# Database Configuration
# ===============================
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url= jdbc:mysql://localhost:3306/resume_analayzer
spring.datasource.username=root
spring.datasource.password=dbpassword

# Optional but recommended for better dialect detection
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===============================
# JPA / Hibernate Settings
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# API / Mail / Custom Keys
# ===============================
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
apiKey=paste api key
genKey=paste gen key

# ===============================
# File Upload Settings
# ===============================
spring.servlet.multipart.max-file-size=3MB
spring.servlet.multipart.max-request-size=3MB
uploads.path=uploads

# ===============================
# Connection Pool (HikariCP)
# ===============================
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=10000
spring.datasource.hikari.max-lifetime=30000
spring.datasource.hikari.connection-timeout=20000

# ===============================
# Server Configuration
# ===============================
# Render dynamically assigns the PORT environment variable.
# Default to 8080 when running locally.
server.port=8085

# ===============================
# Additional (optional)
# ===============================
# Logging for debugging (optional)
logging.level.org.springframework=INFO
logging.level.org.hibernate.SQL=DEBUG

# ===============================
# OAuth2 Client Credentials (Google)
# ===============================
spring.security.oauth2.client.registration.google.client-id=paste client id
spring.security.oauth2.client.registration.google.client-secret=paste client secret
spring.security.oauth2.client.registration.google.scope=openid,email,profile


# ===============================
# Adzuna Credentials
# ===============================
application-id=paste id
application-api-key=paste key


# ===============================
# JWT Credentials
# ===============================
jwt-key=
